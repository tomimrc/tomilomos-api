version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tomilomos-postgres
    environment:
      POSTGRES_USER: tomilomos_user
      POSTGRES_PASSWORD: tomilomos_password_dev
      POSTGRES_DB: tomilomos_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tomilomos_user -d tomilomos_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tomilomos-network

volumes:
  postgres_data:

networks:
  tomilomos-network:
    driver: bridge
