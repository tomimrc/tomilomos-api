# Alembic configuration file

[alembic]
script_location = alembic
# Load DATABASE_URL from environment variables
# sqlalchemy.url will be read from environment in env.py
sqlalchemy.echo = false
sqlalchemy.echo_pool = false
sqlalchemy.max_identifier_length = 63

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
